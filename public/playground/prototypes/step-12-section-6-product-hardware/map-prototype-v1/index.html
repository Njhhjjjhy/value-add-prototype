  <body>
    <!-- Embed mode: set by ?embed=1. Hides dev tools and the language toggle
         so the prototype can be iframed as a clean experience.

         An optional ?host=<name> flag selects an embed host style:
           - (unset)         → iPhone 17 Pro phone frame (gktk-prototype playground)
           - host=valueadd   → fills 100% of the iframe, no phone frame, adds
                               postMessage events and a setup cover so it can
                               be embedded in the value-add-prototype slideshow.
         See docs/value-add-prototype-relationship.md for the relationship
         between this project and value-add-prototype. -->
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        if (params.get("embed") !== "1") return;
        document.documentElement.setAttribute("data-embed", "1");
        var host = params.get("host") || "";
        if (host) document.documentElement.setAttribute("data-embed-host", host);
        if (params.get("chromeless") === "1") {
          document.documentElement.setAttribute("data-chromeless", "1");
        }

        /* host=valueadd skips the iPhone-host setup below (bottom-sheet
           drag, overlay reparenting). embed-mobile.css is scoped with
           :not([data-embed-host="valueadd"]) so its rules don't apply
           in this host; the standalone styles in styles.css win. */
        if (host === "valueadd") return;

        document.addEventListener("DOMContentLoaded", function () {
          /* Reparent overlays into #app-container so their `position: absolute`
             resolves against the phone screen, not the iframe viewport. */
          var host = document.getElementById("app-container");
          if (host) {
            ["right-panel", "gallery-modal", "property-quick-look", "evidence-preview"].forEach(function (id) {
              var el = document.getElementById(id);
              if (el) host.appendChild(el);
            });
          }

          /* Apple Maps-style bottom sheet with three detents and drag.
             The sheet is constrained to its absolute parent (#app-container)
             so it can never escape the phone screen. Touch/mouse drag on
             the handle resizes live; release snaps to the nearest detent
             (peek / medium / large). Tap (no movement) cycles to the next
             detent up. */
          var panel = document.getElementById("right-panel");
          if (!panel) return;

          var DETENT_PCT = { peek: 0.28, medium: 0.56, large: 0.88 };
          var DETENT_ORDER = ["peek", "medium", "large"];
          var currentDetent = "peek";

          function setDetent(name) {
            currentDetent = name;
            panel.classList.remove("sheet-peek", "sheet-medium", "sheet-large");
            panel.classList.add("sheet-" + name);
            panel.style.height = "";
          }
          function cycleDetentUp() {
            var i = DETENT_ORDER.indexOf(currentDetent);
            if (i < DETENT_ORDER.length - 1) setDetent(DETENT_ORDER[i + 1]);
            else setDetent(DETENT_ORDER[0]);
          }
          function snapToNearest(pixelHeight, parentHeight) {
            var ratio = pixelHeight / parentHeight;
            var nearest = DETENT_ORDER[0];
            var bestDelta = Infinity;
            DETENT_ORDER.forEach(function (name) {
              var d = Math.abs(DETENT_PCT[name] - ratio);
              if (d < bestDelta) {
                bestDelta = d;
                nearest = name;
              }
            });
            setDetent(nearest);
          }

          setDetent("peek");

          var handle = document.createElement("button");
          handle.type = "button";
          handle.className = "sheet-handle-hit";
          handle.setAttribute("aria-label", "Resize sheet");
          panel.appendChild(handle);

          /* Drag implementation. Tracks pointer Y and updates panel height
             in real time. On release, snaps to the nearest detent. A drag
             of less than 6px is treated as a tap and cycles up one detent. */
          var dragging = false;
          var startY = 0;
          var startHeight = 0;
          var moved = 0;

          function getParentHeight() {
            return panel.parentElement
              ? panel.parentElement.getBoundingClientRect().height
              : 720;
          }
          function onPointerDown(e) {
            dragging = true;
            moved = 0;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            startHeight = panel.getBoundingClientRect().height;
            panel.classList.add("sheet-dragging");
            if (e.cancelable) e.preventDefault();
          }
          function onPointerMove(e) {
            if (!dragging) return;
            var y = e.touches ? e.touches[0].clientY : e.clientY;
            var dy = y - startY;
            moved = Math.abs(dy);
            var parentH = getParentHeight();
            var maxH = parentH - 60;
            var minH = parentH * 0.18;
            var nextH = Math.max(minH, Math.min(maxH, startHeight - dy));
            panel.style.height = nextH + "px";
            if (e.cancelable) e.preventDefault();
          }
          function onPointerUp() {
            if (!dragging) return;
            dragging = false;
            panel.classList.remove("sheet-dragging");
            if (moved < 6) {
              cycleDetentUp();
              return;
            }
            var h = panel.getBoundingClientRect().height;
            snapToNearest(h, getParentHeight());
          }

          handle.addEventListener("touchstart", onPointerDown, { passive: false });
          handle.addEventListener("mousedown", onPointerDown);
          window.addEventListener("touchmove", onPointerMove, { passive: false });
          window.addEventListener("mousemove", onPointerMove);
          window.addEventListener("touchend", onPointerUp);
          window.addEventListener("mouseup", onPointerUp);
          window.addEventListener("touchcancel", onPointerUp);

          /* When peeked, tapping anywhere inside the sheet body raises it
             to medium so users can see the rest. Buttons and toggles are
             excluded so their own actions still work. */
          panel.addEventListener("click", function (e) {
            if (currentDetent !== "peek") return;
            if (e.target.closest("button, a, input, label, .sheet-handle-hit"))
              return;
            setDetent("medium");
          });

          /* Reset to peek on step change so the map remains the focal point. */
          var mo = new MutationObserver(function (mutations) {
            mutations.forEach(function (m) {
              if (m.type !== "childList") return;
              if (m.target.id !== "panel-content") return;
              if (panel.classList.contains("visible")) setDetent("peek");
            });
          });
          var content = document.getElementById("panel-content");
          if (content) mo.observe(content, { childList: true });
        });
      })();
    </script>

    <!-- value-add-prototype embed host. Activated by ?embed=1&host=valueadd.
         Adds the behaviors the slideshow expects:
           - chromeless toggle via ?chromeless=1 and the
             { type: "gktk-set-chromeless", value } postMessage
           - a #__setup-cover overlay that hides the bundle's first paint
             until the initial framing is in place, then fires
             { type: "gktk-map-ready" } to the parent window
           - capture-phase click interceptor on #nav-back / #nav-forward
             that fires { type: "gktk-map-back-to-content" } at the first
             step (back) and { type: "gktk-map-complete" } at the last step
             (forward), so the slideshow can transition out of the iframe
         See docs/value-add-prototype-relationship.md. -->
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        if (params.get("embed") !== "1") return;
        if (params.get("host") !== "valueadd") return;

        /* Allow the parent slideshow to flip chromeless mode at runtime
           via postMessage. Used during transitions where the map face is
           tilted/animated — any UI on top breaks the illusion. */
        window.addEventListener("message", function (e) {
          if (e.origin !== window.location.origin) return;
          var data = e.data;
          if (!data || typeof data !== "object") return;
          if (data.type === "gktk-set-chromeless") {
            if (data.value) {
              document.documentElement.setAttribute("data-chromeless", "1");
            } else {
              document.documentElement.removeAttribute("data-chromeless");
            }
          }
        });

        /* Setup cover. Covers the screen with a solid #F9F9F9 overlay
           during initialization so the slideshow never sees the bundle's
           default map view or the step-1 entry camera flash before the
           desired framing is in place. We use an overlay rather than
           hiding <html> because some browsers pause WebGL rendering in
           invisible elements, which would stop the map from finishing
           its setup. The map renders normally underneath. */
        var cover = document.createElement("div");
        cover.id = "__setup-cover";
        cover.style.cssText = [
          "position:fixed",
          "inset:0",
          "background:#F9F9F9",
          "z-index:99999",
          "pointer-events:none",
        ].join(";");
        function uncover() {
          if (cover && cover.parentNode) cover.parentNode.removeChild(cover);
          cover = null;
          /* Tell the parent slideshow that the map has reached its initial
             framing and is now visible. Transition steps gate the start
             of their animations on this signal. */
          try {
            window.parent.postMessage({ type: "gktk-map-ready" }, "*");
          } catch (_e) {}
        }
        window.__uncoverSetup = uncover;
        /* Safety reveal in case the normal trigger never fires. Short
           because the fast-entry window caps camera durations, so the
           final auto-fit should complete well under 1s. */
        setTimeout(uncover, 3000);
        if (document.body) {
          document.body.appendChild(cover);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            if (cover) document.body.appendChild(cover);
          });
        }

        /* Boundary intercepts. At the first internal step #nav-back and
           at the last internal step #nav-forward, signal the parent
           slideshow to navigate out of the iframe instead of letting the
           bundle's internal handler run. Capture-phase + closest() so it
           survives node re-creation and beats bundle handlers. */
        document.addEventListener("click", function (e) {
          var t = e.target;
          var fwd = t && t.closest && t.closest("#nav-forward");
          var back = t && t.closest && t.closest("#nav-back");
          if (!fwd && !back) return;
          var stepsParam =
            new URLSearchParams(location.search).get("steps") || "";
          var totalSteps = stepsParam.split(",").filter(Boolean).length;
          if (!totalSteps && window.STEPS && window.STEPS.length) {
            totalSteps = window.STEPS.length;
          }
          if (!totalSteps) return;
          var current =
            (window.App && window.App.state && window.App.state.currentStep) || 1;
          if (fwd && current >= totalSteps) {
            e.preventDefault();
            e.stopImmediatePropagation();
            try {
              window.parent.postMessage({ type: "gktk-map-complete" }, "*");
            } catch (_e) {}
          } else if (back && current <= 1) {
            e.preventDefault();
            e.stopImmediatePropagation();
            try {
              window.parent.postMessage(
                { type: "gktk-map-back-to-content" },
                "*"
              );
            } catch (_e) {}
          }
        }, true);
      })();
    </script>

    <style>
      /* Dev tools are always hidden in any embed mode. */
      [data-embed="1"] #camera-debug-toggle,
      [data-embed="1"] #camera-debug,
      [data-embed="1"] #qa-toggle,
      [data-embed="1"] #qa-panel,
      [data-embed="1"] #camera-explorer-toggle,
      [data-embed="1"] #camera-explorer,
      [data-embed="1"] #step-jumper-toggle,
      [data-embed="1"] #step-jumper,
      [data-embed="1"] #layers-toggle {
        display: none !important;
      }

      /* The iPhone playground embed hides the language toggle, panel
         toggle, time toggle, and journey progress. The value-add
         host wants them visible, so this rule is scoped to NOT match
         when host=valueadd. */
      [data-embed="1"]:not([data-embed-host="valueadd"]) #lang-toggle,
      [data-embed="1"]:not([data-embed-host="valueadd"]) #panel-toggle,
      [data-embed="1"]:not([data-embed-host="valueadd"]) #time-toggle,
      [data-embed="1"]:not([data-embed-host="valueadd"]) #journey-progress {
        display: none !important;
      }

      /* Dev-only QA tool toggle. Cmd+Shift+1 flips data-dev-hidden on <html>
         so the local presenter can clear the screen without leaving the
         browser. Handler is gated by import.meta.env.DEV in main.js, so this
         attribute is only ever set in development. */
      [data-dev-hidden="1"] #camera-debug-toggle,
      [data-dev-hidden="1"] #camera-debug,
      [data-dev-hidden="1"] #qa-toggle,
      [data-dev-hidden="1"] #qa-panel,
      [data-dev-hidden="1"] #camera-explorer-toggle,
      [data-dev-hidden="1"] #camera-explorer,
      [data-dev-hidden="1"] #step-jumper-toggle,
      [data-dev-hidden="1"] #step-jumper {
        display: none !important;
      }

      /* ───── Embed mode: iPhone 17 Pro frame ─────
         Matches the JSX PhoneFrame used by the other playground
         prototypes. The iframe viewport is 440 x 900 (playground
         constant). We paint the neutral page on <html>, center a
         380 x 732 bezel on <body>, and the app fills the 368 x 720
         screen inside. The `transform` on body makes body the
         containing block for descendants with `position: fixed`,
         so the right panel, gallery, and overlays stay inside the
         phone screen instead of escaping to the iframe viewport. */
      [data-embed="1"] {
        background: #EDEEF1;
      }
      html[data-embed="1"] {
        min-height: 100%;
      }
      [data-embed="1"] body {
        width: 380px;
        height: 732px;
        padding: 6px;
        margin: 0 auto;
        box-sizing: border-box;
        background: #1A1A1E;
        border-radius: 44px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        overflow: hidden;
        position: relative;
        transform: translate(0, 0);
      }
      [data-embed="1"] #app-container {
        position: relative;
        top: auto;
        left: auto;
        width: 100%;
        height: 100%;
        border-radius: 40px;
        overflow: hidden;
        background: #F9F9F9;
      }
      [data-embed="1"] #map-container {
        border-radius: 40px;
        overflow: hidden;
      }

      /* Full-screen modal overlays stay inside the phone screen. The
         bottom sheet (#right-panel) and the nav arrows are styled in
         embed-mobile.css. */
      [data-embed="1"] #gallery-modal,
      [data-embed="1"] #property-quick-look,
      [data-embed="1"] #evidence-preview {
        position: absolute;
        inset: 0;
        width: auto;
        height: auto;
        border-radius: 40px;
        overflow: hidden;
      }

      /* ───── value-add-prototype embed host overrides ─────
         Activated by ?embed=1&host=valueadd. Overrides the iPhone phone
         frame above and lets the iframe fill its container — the slideshow
         draws its own iPad frame around the iframe. */
      [data-embed-host="valueadd"] {
        background: #F9F9F9;
      }
      html[data-embed-host="valueadd"],
      [data-embed-host="valueadd"] body {
        width: 100%;
        height: 100%;
        min-height: 0;
        margin: 0;
        padding: 0;
        overflow: hidden;
        box-sizing: border-box;
      }
      [data-embed-host="valueadd"] body {
        background: #F9F9F9;
        border-radius: 0;
        box-shadow: none;
        position: relative;
        transform: translate(0, 0);
      }
      [data-embed-host="valueadd"] #app-container {
        border-radius: 0;
      }
      [data-embed-host="valueadd"] #map-container {
        border-radius: 0;
      }
      [data-embed-host="valueadd"] #gallery-modal,
      [data-embed-host="valueadd"] #property-quick-look,
      [data-embed-host="valueadd"] #evidence-preview {
        border-radius: 0;
      }

      /* Chromeless mode (toggled via ?chromeless=1 or postMessage). Hides
         every interactive overlay so the map reads as a pure visual
         surface during transitions. */
      [data-chromeless="1"] #right-panel,
      [data-chromeless="1"] #nav-arrows,
      [data-chromeless="1"] #view-mode-toggle,
      [data-chromeless="1"] #lang-toggle {
        display: none !important;
      }
    </style>

    <script>
      /* Mapbox access token. Resolution order:
           1. window.parent.__GKTK_MAPBOX_ACCESS_TOKEN — injected by an
              embedding host (e.g. value-add-prototype) so the token is
              never duplicated into another repo's public/ directory.
           2. ?mapbox_access_token= URL param.
           3. The bundled fallback below — for standalone use.
         The standalone map runs from this repo where the token is
         already tracked; embedded uses pull from the parent so the
         consuming repo's pushes are not flagged by secret scanners. */
      (function () {
        var token = null;
        try {
          if (
            window.parent &&
            window.parent !== window &&
            window.parent.__GKTK_MAPBOX_ACCESS_TOKEN
          ) {
            token = window.parent.__GKTK_MAPBOX_ACCESS_TOKEN;
          }
        } catch (_) {}
        if (!token) {
          token = new URLSearchParams(location.search).get(
            "mapbox_access_token",
          );
        }
        if (!token) {
          token =
            "";
        }
        window.MAPBOX_ACCESS_TOKEN = token;
      })();
    </script>

    <!-- Language toggle (top-right) -->
    <button id="lang-toggle" aria-label="切換語言">EN</button>
    <script>
      (function () {
        const btn = document.getElementById("lang-toggle");
        // Optional ?lang= query-param overrides localStorage. Used by embeds
        // that need a deterministic language regardless of prior visits.
        const urlLang = new URLSearchParams(location.search).get("lang");
        if (urlLang === "en" || urlLang === "zh-TW") {
          localStorage.setItem("app-lang", urlLang);
        }
        const current = localStorage.getItem("app-lang") || "en";
        document.documentElement.lang = current;
        btn.textContent = current === "zh-TW" ? "EN" : "中文";
        btn.addEventListener("click", function () {
          const next = current === "zh-TW" ? "en" : "zh-TW";
          localStorage.setItem("app-lang", next);
          location.reload();
        });
      })();
    </script>

    <!-- Rotate-to-landscape overlay (touch devices in portrait).
         The app is designed for landscape; this overlay covers the
         broken portrait layout until the user rotates the iPad. -->
    <div id="rotate-overlay" aria-hidden="true">
      <div class="rotate-overlay-inner">
        <svg
          class="rotate-overlay-icon"
          width="96"
          height="96"
          viewBox="0 0 96 96"
          fill="none"
          aria-hidden="true"
        >
          <rect
            x="30"
            y="10"
            width="36"
            height="54"
            rx="5"
            stroke="currentColor"
            stroke-width="3"
            fill="none"
          />
          <circle cx="48" cy="58" r="1.6" fill="currentColor" />
          <path
            d="M16 66 Q16 84 34 84 L62 84 Q80 84 80 66"
            stroke="currentColor"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M74 70 L80 64 L86 70"
            stroke="currentColor"
            stroke-width="3"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <h2 class="rotate-overlay-title">Rotate to Landscape</h2>
        <p class="rotate-overlay-body">
          This experience is designed for landscape orientation.
        </p>
      </div>
    </div>

    <!-- App JS (ES modules) -->
  </body>
</html>
